name: Release
permissions:
  actions: write
  checks: write
  contents: write
  pull-requests: write
  statuses: write

on:
  workflow_dispatch:
    inputs:
      registry:
        description: 'Registry to publish to'
        required: true
        default: 'both'
        type: choice
        options:
          - both
          - marketplace
          - ovsx
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x

      - name: Install dependencies
        run: npm ci

      - name: Compile extension
        run: npm run compile

      - name: Run tests
        run: |
          if command -v xvfb-run > /dev/null 2>&1; then
            xvfb-run -a npm test
          else
            npm test
          fi

      - name: Package VSIX
        run: npm run package

      - name: Publish to VS Code Marketplace
        if: success() && inputs.registry != 'ovsx'
        run: npm run release:marketplace
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}

      - name: Publish to Open VSX Registry
        if: success() && inputs.registry != 'marketplace'
        run: npm run release:ovsx
        env:
          OPEN_VSX_TOKEN: ${{ secrets.OPEN_VSX_TOKEN }}
