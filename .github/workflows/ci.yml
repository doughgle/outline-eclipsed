name: CI
permissions:
  actions: write
  checks: write
  contents: write
  pull-requests: write
  statuses: write

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  build:
    strategy:
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x

      - name: Install dependencies
        run: npm ci

      - name: Compile extension
        run: npm run compile

      - name: Run tests on Linux
        if: runner.os == 'Linux'
        run: |
          if command -v xvfb-run > /dev/null 2>&1; then
            xvfb-run -a npm test
          else
            npm test
          fi

      - name: Run tests on macOS/Windows
        if: runner.os != 'Linux'
        run: npm test

      - name: Package extension
        run: npm run package
