name: CI
permissions:
  actions: write
  checks: write
  contents: write
  pull-requests: write
  statuses: write

on:
  workflow_dispatch:
    inputs:
      registry:
        description: 'Registry to publish to'
        required: true
        default: 'both'
        type: choice
        options:
          - both
          - marketplace
          - ovsx
  push:
    branches:
      - master
    tags:
      - 'v*'
  pull_request:
    branches:
      - master
  release:
    types:
      - created

jobs:
  build:
    strategy:
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x

      - name: Install dependencies
        run: npm ci

      - name: Compile extension
        run: npm run compile

      - name: Run tests on Linux
        if: runner.os == 'Linux'
        run: |
          if command -v xvfb-run > /dev/null 2>&1; then
            xvfb-run -a npm test
          else
            npm test
          fi

      - name: Run tests on macOS/Windows
        if: runner.os != 'Linux'
        run: npm test

      - name: Package VSIX
        if: success() && matrix.os == 'ubuntu-latest' && (startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch')
        run: npm run package

      - name: Publish to VS Code Marketplace
        if: success() && matrix.os == 'ubuntu-latest' && (startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && inputs.registry != 'ovsx'))
        run: npm run release:marketplace
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}

      - name: Publish to Open VSX Registry
        if: success() && matrix.os == 'ubuntu-latest' && (startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && inputs.registry != 'marketplace'))
        run: npm run release:ovsx
        env:
          OPEN_VSX_TOKEN: ${{ secrets.OPEN_VSX_TOKEN }}
